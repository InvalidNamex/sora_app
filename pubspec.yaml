name: sora
description: "A new Flutter project."

publish_to: 'none' 


version: 1.0.0+10

environment:
  sdk: ^3.11.1

dependencies:
  sentry_flutter: ^9.24.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  # State management, routing, DI, localization
  get: ^5.0.0-release-candidate-9.3.3

  # Local storage (theme, guest cart, affiliate id)
  get_storage_wasm: 2.1.2

  # Environment variables
  flutter_dotenv: ^5.2.1

  # Firebase (auth, FCM)
  firebase_core: ^4.12.1
  firebase_auth: ^6.5.6
  firebase_messaging: ^16.4.3
  google_sign_in: ^6.2.2

  # Supabase (data)
  supabase_flutter: ^2.8.1

  # UI
  carousel_slider: ^5.1.2
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0

  # Deep linking (affiliate)
  app_links: ^6.3.2

  # Launch phone/email
  url_launcher: ^6.3.1

  # Native/web share sheet
  share_plus: ^11.1.0

  # Date/number formatting
  intl: ^0.20.2

  # Cross-platform map (OpenStreetMap, no API key needed)
  flutter_map: ^7.0.0
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  image_picker: ^1.2.3
  flutter_local_notifications: ^22.0.1

dev_dependencies:
  sentry_dart_plugin: ^3.4.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.5
  flutter_launcher_icons: ^0.14.4

flutter_native_splash:
  color: "#F1F0E9"
  image: assets/images/splash_wordmark.png
  android_gravity: center
  ios_content_mode: scaleAspectFit
  web_image_mode: contain
  color_dark: "#F1F0E9"
  image_dark: assets/images/splash_wordmark.png
  android_12:
    image: assets/images/splash_wordmark.png
    color: "#F1F0E9"
    image_dark: assets/images/splash_wordmark.png
    color_dark: "#F1F0E9"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logoWithBG.png"
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/images/logoWithBG.png"
    background_color: "#F1F0E9"
    theme_color: "#B09263"
  windows:
    generate: true
    image_path: "assets/images/logoWithBG.png"
    icon_size: 48

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/images/
    - .env
    - shorebird.yaml

  fonts:
    - family: ElMessiri
      fonts:
        - asset: assets/fonts/ElMessiri.ttf
    - family: Kufi
      fonts:
        - asset: assets/fonts/Kufi.ttf

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  upload_sources: false
  commits: false
  project: sora
  org: casatek
